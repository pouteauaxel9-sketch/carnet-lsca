name: Sync FFF Data

on:
  schedule:
    # Lundi 6h00 UTC = 7h00 heure française (heure d'été)
    - cron: '0 6 * * 1'
  # Permet de lancer manuellement depuis l'onglet "Actions" sur GitHub
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Installer les dépendances
        run: npm install
        working-directory: scripts

      - name: Installer Chromium pour Puppeteer
        run: npx puppeteer browsers install chrome
        working-directory: scripts
        env:
          PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer

      - name: Lancer le scraper
        run: node scrape-fff.js
        working-directory: scripts
        env:
          PUPPETEER_CACHE_DIR: /home/runner/.cache/puppeteer

      - name: Committer les données mises à jour
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/feeds.json
          git diff --staged --quiet || git commit -m "sync: données FFF du $(date +'%d/%m/%Y') [skip ci]"
          git push
