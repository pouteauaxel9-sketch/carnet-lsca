name: Sync FFF Data

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Installer Chromium système
        run: sudo apt-get install -y chromium-browser

      - name: Installer les dépendances
        run: npm install
        working-directory: scripts

      - name: Lancer le scraper
        run: node scrape-fff.js
        working-directory: scripts
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser

      - name: Committer les données mises à jour
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/feeds.json
          git diff --staged --quiet || git commit -m "sync: données FFF du $(date +'%d/%m/%Y') [skip ci]"
          git push
